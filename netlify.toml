# Netlify build configuration for True North Business Loan
# _headers and _redirects live in public/ and are copied to dist/ at build time —
# Netlify reads them from the publish directory, so they are NOT duplicated here.

[build]
  command = "npm run build"
  publish = "dist"

# Node 22+ is required: the prerender step instantiates the Supabase client,
# whose @supabase/realtime-js dependency needs a native global WebSocket that
# Node 20 does not provide (build failed with "WebSocket is not defined").
# Node 22 also supplies the globals the SSR render relies on.
[build.environment]
  NODE_VERSION = "22"
