name: Daily blog post

# Fully autonomous SEO/AEO blog post generator + publisher.
# Runs on GitHub's infrastructure, so it has real network access to Supabase
# (unlike a local sandbox) and does not require any app to be open.
#
# One-time setup — add these repository secrets
# (Settings -> Secrets and variables -> Actions -> New repository secret):
#   SUPABASE_SERVICE_ROLE_KEY   Supabase -> Project Settings -> API -> service_role
#   GEMINI_API_KEY              Google AI Studio API key
# Optional repository variables:
#   SUPABASE_URL   (defaults to the True North project URL)
#   GEMINI_MODEL   (leave unset: the script auto-selects a current model)

on:
  schedule:
    # 06:00 UTC = 2:00 AM Eastern (EDT). Use '0 7 * * *' during EST if the hour matters.
    # To pause: comment out these two lines. workflow_dispatch below still works.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optional: force a specific topic (leave blank to auto-pick)'
        required: false
      dry_run:
        description: 'Build the post but do NOT publish (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write   # needed to commit the updated sitemap

concurrency:
  group: daily-blog-post
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # 22+ required: @supabase/supabase-js needs a native global WebSocket,
          # absent on Node 20.
          node-version: '22'

      - name: Install dependencies
        run: npm install @supabase/supabase-js sharp --no-audit --no-fund

      - name: Generate and publish post
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || 'https://kgwcogltpsmapxnjzjhm.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Left empty on purpose: the script picks a currently-available model.
          # Set the GEMINI_MODEL repo variable only to pin a specific one.
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          FORCE_TOPIC: ${{ github.event.inputs.topic }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: node scripts/daily-blog-post.mjs

      # A dry run writes the post to drafts/ inside the runner, which is thrown
      # away with the machine. Keep it so the draft can actually be reviewed
      # before anyone publishes for real.
      - name: Upload draft for review
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: blog-draft
          path: drafts/**
          if-no-files-found: warn
          retention-days: 14

      # Publishing to the database is not enough: /blog and each /blog/:slug are
      # prerendered at build time, so without a deploy the new post is invisible
      # to anything that doesn't run JavaScript and /blog keeps listing the
      # previous set. This push is what triggers that deploy — deliberately
      # WITHOUT [skip ci].
      # No loop risk: the only push-triggered workflow is content-check.yml,
      # which is read-only and pushes nothing. (GitHub also does not fire
      # workflows for pushes made with the default GITHUB_TOKEN.)
      - name: Commit sitemap and trigger the rebuild
        run: |
          if [ -n "$(git status --porcelain public/sitemap.xml blog-framework/published-log.md)" ]; then
            git config user.name  "truenorth-bot"
            git config user.email "bot@truenorthbusinessloan.ca"
            git add public/sitemap.xml blog-framework/published-log.md
            git commit -m "blog: publish today's post"
            git push
            echo "Pushed — Netlify will rebuild and prerender the new post."
          else
            echo "::warning::Nothing to commit, so no rebuild was triggered. The post is live in the database but will not be prerendered until the next deploy."
          fi
